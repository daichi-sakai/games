<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2048</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
body { background: #faf8ef; font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px 16px; user-select: none; }
h1 { font-size: 48px; font-weight: 900; color: #776e65; letter-spacing: -2px; margin-bottom: 12px; }
.header { width: 100%; max-width: 420px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.scores { display: flex; gap: 10px; }
.score-box { background: #bbada0; border-radius: 6px; padding: 8px 16px; text-align: center; min-width: 80px; }
.score-box .label { font-size: 11px; font-weight: bold; color: #eee4da; letter-spacing: 1px; }
.score-box .value { font-size: 22px; font-weight: bold; color: white; }
.new-game-btn { background: #8f7a66; color: white; border: none; border-radius: 6px; padding: 12px 18px; font-size: 16px; font-weight: bold; cursor: pointer; }
.new-game-btn:active { opacity: 0.8; }
.hint { color: #b8ad99; font-size: 14px; margin-bottom: 16px; text-align: center; }
.grid-container { background: #bbada0; border-radius: 8px; padding: 10px; width: 100%; max-width: 420px; position: relative; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.cell-bg { background: rgba(238, 228, 218, 0.35); border-radius: 4px; aspect-ratio: 1; }
.tiles-layer { position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; pointer-events: none; }
.tile { border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 36px; color: #776e65; transition: background 0.1s; animation: popIn 0.15s ease; }
@keyframes popIn { 0% { transform: scale(0); } 60% { transform: scale(1.1); } 100% { transform: scale(1); } }
.tile.merged { animation: mergeAnim 0.2s ease; }
@keyframes mergeAnim { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
.t2 { background: #eee4da; } .t4 { background: #ede0c8; } .t8 { background: #f2b179; color: #fff; }
.t16 { background: #f59563; color: #fff; } .t32 { background: #f67c5f; color: #fff; } .t64 { background: #f65e3b; color: #fff; }
.t128 { background: #edcf72; color: #fff; font-size: 30px; } .t256 { background: #edcc61; color: #fff; font-size: 30px; }
.t512 { background: #edc850; color: #fff; font-size: 30px; } .t1024 { background: #edc53f; color: #fff; font-size: 24px; }
.t2048 { background: #edc22e; color: #fff; font-size: 24px; } .t-big { background: #3c3a32; color: #fff; font-size: 20px; }
.overlay { position: absolute; inset: 0; border-radius: 8px; background: rgba(238,228,218,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 10; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.overlay.hidden { display: none; }
.overlay-title { font-size: 36px; font-weight: 900; color: #776e65; }
.overlay-btn { background: #8f7a66; color: white; border: none; border-radius: 6px; padding: 14px 28px; font-size: 18px; font-weight: bold; cursor: pointer; min-width: 140px; }
.overlay-btn.continue-btn { background: #edcf72; color: #776e65; }
</style>
</head>
<body>
<h1>2048</h1>
<div class="header">
  <div class="scores">
    <div class="score-box"><div class="label">スコア</div><div class="value" id="score">0</div></div>
    <div class="score-box"><div class="label">ベスト</div><div class="value" id="best">0</div></div>
  </div>
  <button class="new-game-btn" onclick="newGame()">新しいゲーム</button>
</div>
<div class="hint">スワイプ or 矢印キーで動かそう！</div>
<div class="grid-container" id="grid-container">
  <div class="grid" id="grid-bg"></div>
  <div class="tiles-layer" id="tiles-layer"></div>
  <div class="overlay hidden" id="overlay-gameover">
    <div class="overlay-title">ゲームオーバー！</div>
    <button class="overlay-btn" onclick="newGame()">もう一度</button>
  </div>
  <div class="overlay hidden" id="overlay-win">
    <div class="overlay-title">🎉 2048達成！</div>
    <button class="overlay-btn continue-btn" onclick="continueGame()">続ける</button>
    <button class="overlay-btn" onclick="newGame()">もう一度</button>
  </div>
</div>
<script>
let board=[],score=0,best=0,won=false,over=false;const SIZE=4;
function newGame(){board=Array.from({length:SIZE},()=>Array(SIZE).fill(0));score=0;won=false;over=false;document.getElementById('overlay-gameover').classList.add('hidden');document.getElementById('overlay-win').classList.add('hidden');addTile();addTile();updateScore();render();}
function continueGame(){won=true;document.getElementById('overlay-win').classList.add('hidden');}
function addTile(){const empty=[];for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(!board[r][c])empty.push([r,c]);if(!empty.length)return;const[r,c]=empty[Math.floor(Math.random()*empty.length)];board[r][c]=Math.random()<0.9?2:4;}
function updateScore(){best=Math.max(best,score);try{localStorage.setItem('2048best',best);}catch(e){}document.getElementById('score').textContent=score;document.getElementById('best').textContent=best;}
function render(){const layer=document.getElementById('tiles-layer');layer.innerHTML='';for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){const v=board[r][c];if(!v)continue;const tile=document.createElement('div');tile.className='tile '+tileClass(v);tile.textContent=v;tile.style.gridRow=r+1;tile.style.gridColumn=c+1;layer.appendChild(tile);}}
function tileClass(v){return v<=2048?'t'+v:'t-big';}
function slide(row){let arr=row.filter(x=>x);let gained=0;for(let i=0;i<arr.length-1;i++){if(arr[i]===arr[i+1]){arr[i]*=2;gained+=arr[i];arr.splice(i+1,1);}}while(arr.length<SIZE)arr.push(0);return{arr,gained};}
function move(dir){if(over)return;let moved=false;let gained=0;const prev=board.map(r=>[...r]);if(dir==='left'){for(let r=0;r<SIZE;r++){const res=slide(board[r]);board[r]=res.arr;gained+=res.gained;}}else if(dir==='right'){for(let r=0;r<SIZE;r++){const res=slide([...board[r]].reverse());board[r]=res.arr.reverse();gained+=res.gained;}}else if(dir==='up'){for(let c=0;c<SIZE;c++){const col=board.map(r=>r[c]);const res=slide(col);for(let r=0;r<SIZE;r++)board[r][c]=res.arr[r];gained+=res.gained;}}else if(dir==='down'){for(let c=0;c<SIZE;c++){const col=board.map(r=>r[c]).reverse();const res=slide(col);const newCol=res.arr.reverse();for(let r=0;r<SIZE;r++)board[r][c]=newCol[r];gained+=res.gained;}}for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(board[r][c]!==prev[r][c])moved=true;if(!moved)return;score+=gained;updateScore();addTile();render();if(!won){for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(board[r][c]===2048){document.getElementById('overlay-win').classList.remove('hidden');won='shown';return;}}if(isGameOver()){over=true;document.getElementById('overlay-gameover').classList.remove('hidden');}}
function isGameOver(){for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){if(!board[r][c])return false;if(c<SIZE-1&&board[r][c]===board[r][c+1])return false;if(r<SIZE-1&&board[r][c]===board[r+1][c])return false;}return true;}
document.addEventListener('keydown',e=>{const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};if(map[e.key]){e.preventDefault();move(map[e.key]);}});
let touchStart=null;document.getElementById('grid-container').addEventListener('touchstart',e=>{touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});document.getElementById('grid-container').addEventListener('touchend',e=>{if(!touchStart)return;const dx=e.changedTouches[0].clientX-touchStart.x;const dy=e.changedTouches[0].clientY-touchStart.y;touchStart=null;if(Math.abs(dx)<20&&Math.abs(dy)<20)return;if(Math.abs(dx)>Math.abs(dy))move(dx>0?'right':'left');else move(dy>0?'down':'up');},{passive:true});
const bg=document.getElementById('grid-bg');for(let i=0;i<16;i++){const cell=document.createElement('div');cell.className='cell-bg';bg.appendChild(cell);}
try{best=parseInt(localStorage.getItem('2048best'))||0;}catch(e){}document.getElementById('best').textContent=best;newGame();
</script>
</body>
</html>
